name: Bug Report
description: Report a bug in any APIForge SDK or service
title: "[Bug] "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: dropdown
    id: repository
    attributes:
      label: Affected repository
      options:
        - sdk-nodejs
        - sdk-python
        - sdk-nestjs
        - api
        - dashboard
        - other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js / Runtime version
      placeholder: "e.g. Node.js 22.5, Python 3.12"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install apiforgejs
        2. Configure with `{ mode: 'local' }`
        3. Send a request to any route
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have tested on the latest version
          required: true
